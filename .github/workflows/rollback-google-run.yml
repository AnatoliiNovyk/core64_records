name: Rollback Google Run

on:
  workflow_dispatch:
    inputs:
      gcp_project_id:
        description: GCP project ID
        required: true
        type: string
      gcp_region:
        description: Google Cloud region
        required: false
        default: europe-west1
        type: string
      service_name:
        description: Cloud Run service name
        required: false
        default: core64-api
        type: string
      target_revision:
        description: Optional target revision name (leave empty to auto-pick previous)
        required: false
        default: ""
        type: string
      admin_password_secret_name:
        description: GCP Secret Manager secret name for ADMIN_PASSWORD
        required: false
        default: ADMIN_PASSWORD
        type: string
      run_post_rollback_smoke:
        description: Run smoke-check after rollback (true/false)
        required: false
        default: "true"
        type: string
      core64_smoke_timeout_ms:
        description: Smoke-check timeout in milliseconds
        required: false
        default: "15000"
        type: string
      core64_smoke_retries:
        description: Post-rollback smoke-check retry attempts
        required: false
        default: "3"
        type: string
      core64_smoke_contact:
        description: Enable optional contact endpoint check in post-rollback smoke (true/false)
        required: false
        default: "false"
        type: string

jobs:
  rollback:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required workflow secret
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "Missing required secret: GCP_SA_KEY"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ github.event.inputs.gcp_project_id }}

      - name: Validate rollback inputs
        env:
          RUN_POST_ROLLBACK_SMOKE: ${{ github.event.inputs.run_post_rollback_smoke }}
          CORE64_SMOKE_CONTACT: ${{ github.event.inputs.core64_smoke_contact }}
          CORE64_SMOKE_TIMEOUT_MS: ${{ github.event.inputs.core64_smoke_timeout_ms }}
          CORE64_SMOKE_RETRIES: ${{ github.event.inputs.core64_smoke_retries }}
        run: |
          for flag in "$RUN_POST_ROLLBACK_SMOKE" "$CORE64_SMOKE_CONTACT"; do
            if [ "$flag" != "true" ] && [ "$flag" != "false" ]; then
              echo "Boolean inputs must be 'true' or 'false'"
              exit 1
            fi
          done

          if ! [[ "$CORE64_SMOKE_TIMEOUT_MS" =~ ^[0-9]+$ ]] || [ "$CORE64_SMOKE_TIMEOUT_MS" -lt 1000 ]; then
            echo "core64_smoke_timeout_ms must be an integer >= 1000"
            exit 1
          fi

          if ! [[ "$CORE64_SMOKE_RETRIES" =~ ^[0-9]+$ ]] || [ "$CORE64_SMOKE_RETRIES" -lt 1 ]; then
            echo "core64_smoke_retries must be an integer >= 1"
            exit 1
          fi

      - name: Setup Node.js
        if: ${{ github.event.inputs.run_post_rollback_smoke == 'true' }}
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Select rollback revision
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          SERVICE_NAME: ${{ github.event.inputs.service_name }}
          TARGET_REVISION_INPUT: ${{ github.event.inputs.target_revision }}
        run: |
          if [ -n "$TARGET_REVISION_INPUT" ]; then
            TARGET_REVISION="$TARGET_REVISION_INPUT"
          else
            mapfile -t REVISIONS < <(gcloud run revisions list --service "$SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --sort-by="~metadata.creationTimestamp" --format="value(metadata.name)")
            if [ "${#REVISIONS[@]}" -lt 2 ]; then
              echo "Unable to auto-select previous revision. Provide target_revision manually."
              exit 1
            fi
            TARGET_REVISION="${REVISIONS[1]}"
          fi

          echo "TARGET_REVISION=$TARGET_REVISION" >> "$GITHUB_ENV"
          echo "Rollback target revision: $TARGET_REVISION"

      - name: Rollback traffic to selected revision
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          SERVICE_NAME: ${{ github.event.inputs.service_name }}
        run: |
          gcloud run services update-traffic "$SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --to-revisions "$TARGET_REVISION=100"

      - name: Post-rollback smoke check
        if: ${{ github.event.inputs.run_post_rollback_smoke == 'true' }}
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          SERVICE_NAME: ${{ github.event.inputs.service_name }}
          ADMIN_PASSWORD_SECRET_NAME: ${{ github.event.inputs.admin_password_secret_name }}
          CORE64_SMOKE_TIMEOUT_MS: ${{ github.event.inputs.core64_smoke_timeout_ms }}
          CORE64_SMOKE_RETRIES: ${{ github.event.inputs.core64_smoke_retries }}
          CORE64_SMOKE_CONTACT: ${{ github.event.inputs.core64_smoke_contact }}
          CORE64_SMOKE_MODE: health
        run: |
          SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format='value(status.url)')
          if [ -z "$SERVICE_URL" ]; then
            echo "Unable to resolve Cloud Run service URL for smoke-check"
            exit 1
          fi

          ADMIN_PASSWORD=$(gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$ADMIN_PASSWORD_SECRET_NAME")
          if [ -z "$ADMIN_PASSWORD" ]; then
            echo "Unable to read admin password from Secret Manager"
            exit 1
          fi

          export CORE64_API_BASE="$SERVICE_URL/api"
          export CORE64_ADMIN_PASSWORD="$ADMIN_PASSWORD"

          RETRIES=${CORE64_SMOKE_RETRIES:-3}
          if ! [[ "$RETRIES" =~ ^[0-9]+$ ]] || [ "$RETRIES" -lt 1 ]; then
            echo "Invalid CORE64_SMOKE_RETRIES value: $RETRIES"
            exit 1
          fi

          attempt=1
          until [ "$attempt" -gt "$RETRIES" ]; do
            echo "Running post-rollback smoke-check against $CORE64_API_BASE (attempt $attempt/$RETRIES)"
            if node scripts/smoke-check.mjs; then
              echo "Post-rollback smoke-check passed on attempt $attempt."
              exit 0
            fi

            if [ "$attempt" -lt "$RETRIES" ]; then
              echo "Smoke-check failed on attempt $attempt; waiting 15s before retry."
              sleep 15
            fi

            attempt=$((attempt + 1))
          done

          echo "Post-rollback smoke-check failed after $RETRIES attempts."
          exit 1

      - name: Collect diagnostics after rollback smoke failure
        if: ${{ failure() && github.event.inputs.run_post_rollback_smoke == 'true' }}
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          SERVICE_NAME: ${{ github.event.inputs.service_name }}
          DATABASE_URL_SECRET_NAME: DATABASE_URL
        run: |
          set +e

          SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format='value(status.url)')
          REVISION=$(gcloud run services describe "$SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format='value(status.latestReadyRevisionName)')

          echo "Diagnostic: service URL = $SERVICE_URL"
          echo "Diagnostic: latest ready revision = $REVISION"

          DATABASE_URL=$(gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$DATABASE_URL_SECRET_NAME")
          if [ -n "$DATABASE_URL" ]; then
            echo "Diagnostic: DATABASE_URL target snapshot (safe metadata)"
            DATABASE_URL_VALUE="$DATABASE_URL" node -e "const v=process.env.DATABASE_URL_VALUE||''; try { const u=new URL(v); const db=(u.pathname||'').replace(/^\//,'')||null; const sslmode=u.searchParams.get('sslmode'); console.log(JSON.stringify({ protocol:u.protocol.replace(':',''), host:u.hostname||null, port:u.port||null, database:db, sslmode:sslmode||null }, null, 2)); } catch { console.log('{\"databaseUrlParse\":\"failed\"}'); }"
          fi

          if [ -n "$SERVICE_URL" ]; then
            echo "Diagnostic: GET $SERVICE_URL/api/health"
            curl -sS -i "$SERVICE_URL/api/health" || true

            echo "Diagnostic: GET $SERVICE_URL/api/health/db"
            curl -sS -i "$SERVICE_URL/api/health/db" || true
          fi

          if [ -n "$REVISION" ]; then
            echo "Diagnostic: recent Cloud Run logs for revision $REVISION"
            gcloud logging read \
              "resource.type=cloud_run_revision AND resource.labels.service_name=$SERVICE_NAME AND resource.labels.revision_name=$REVISION" \
              --project "$GCP_PROJECT_ID" \
              --limit 80 \
              --order desc \
              --format='value(timestamp,severity,textPayload,jsonPayload.message)' || true
          fi

          echo "Diagnostic: Cloud Run networking annotations"
          gcloud run services describe "$SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='yaml(spec.template.metadata.annotations)' || true
