name: Pre-Release Gate

on:
  workflow_dispatch:
    inputs:
      core64_api_base:
        description: API base URL for smoke-check
        required: true
        type: string
      core64_admin_password:
        description: Deprecated fallback admin password for smoke-check auth flow (prefer secret CORE64_ADMIN_PASSWORD)
        required: false
        type: string
      core64_smoke_timeout_ms:
        description: Request timeout in milliseconds for API and UI smoke
        required: false
        default: "15000"
        type: string
      core64_smoke_contact:
        description: Enable contact endpoint smoke check (true/false)
        required: false
        default: "true"
        type: string
      core64_smoke_rate_limit_check:
        description: Enable mutation rate-limit 429 smoke check (true/false)
        required: false
        default: "true"
        type: string
      core64_smoke_rate_limit_attempts:
        description: Max attempts for optional mutation rate-limit smoke check
        required: false
        default: "25"
        type: string
      core64_smoke_rate_limit_collections_attempts:
        description: Max attempts for optional dynamic-id collections rate-limit smoke check
        required: false
        default: "35"
        type: string
      core64_override_role_diversity:
        description: Override release owner diversity requirement in emergency (true/false)
        required: false
        default: "false"
        type: string
      core64_changelog_base_ref:
        description: Git base ref for changelog coverage check
        required: false
        default: HEAD~1
        type: string
      core64_changelog_head_ref:
        description: Git head ref for changelog coverage check
        required: false
        default: HEAD
        type: string
      owner:
        description: Repository owner for branch protection verification
        required: false
        default: AnatoliiNovyk
        type: string
      repo:
        description: Repository name for branch protection verification
        required: false
        default: core64_records
        type: string
      branch:
        description: Branch name for branch protection verification
        required: false
        default: main
        type: string
      expected_check_contexts:
        description: Comma-separated accepted status check contexts
        required: false
        default: smoke,Smoke Check / smoke
        type: string
      minimum_approvals:
        description: Minimum required PR approvals
        required: false
        default: "1"
        type: string
      expected_conversation_resolution:
        description: Conversation resolution expectation (any|true|false)
        required: false
        default: any
        type: choice
        options:
          - any
          - true
          - false

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve admin password source
        env:
          CORE64_ADMIN_PASSWORD_SECRET: ${{ secrets['CORE64_ADMIN_PASSWORD'] }}
          CORE64_ADMIN_PASSWORD_INPUT: ${{ github.event.inputs.core64_admin_password }}
        run: |
          if [ -n "$CORE64_ADMIN_PASSWORD_SECRET" ]; then
            echo "::add-mask::$CORE64_ADMIN_PASSWORD_SECRET"
            {
              echo "CORE64_ADMIN_PASSWORD<<EOF"
              echo "$CORE64_ADMIN_PASSWORD_SECRET"
              echo "EOF"
            } >> "$GITHUB_ENV"
            echo "CORE64_ADMIN_PASSWORD_SOURCE=secret" >> "$GITHUB_ENV"
          elif [ -n "$CORE64_ADMIN_PASSWORD_INPUT" ]; then
            echo "::add-mask::$CORE64_ADMIN_PASSWORD_INPUT"
            {
              echo "CORE64_ADMIN_PASSWORD<<EOF"
              echo "$CORE64_ADMIN_PASSWORD_INPUT"
              echo "EOF"
            } >> "$GITHUB_ENV"
            echo "CORE64_ADMIN_PASSWORD_SOURCE=input_fallback" >> "$GITHUB_ENV"
            echo "::warning::Input core64_admin_password is deprecated. Configure repository secret CORE64_ADMIN_PASSWORD."
          else
            echo "Missing admin password. Configure secret CORE64_ADMIN_PASSWORD or provide fallback input core64_admin_password."
            exit 1
          fi

      - name: Validate required inputs
        env:
          CORE64_API_BASE: ${{ github.event.inputs.core64_api_base }}
          CORE64_SMOKE_TIMEOUT_MS: ${{ github.event.inputs.core64_smoke_timeout_ms }}
          CORE64_SMOKE_CONTACT: ${{ github.event.inputs.core64_smoke_contact }}
          CORE64_SMOKE_RATE_LIMIT_CHECK: ${{ github.event.inputs.core64_smoke_rate_limit_check }}
          CORE64_SMOKE_RATE_LIMIT_ATTEMPTS: ${{ github.event.inputs.core64_smoke_rate_limit_attempts }}
          CORE64_SMOKE_RATE_LIMIT_COLLECTIONS_ATTEMPTS: ${{ github.event.inputs.core64_smoke_rate_limit_collections_attempts }}
          CORE64_OVERRIDE_ROLE_DIVERSITY: ${{ github.event.inputs.core64_override_role_diversity }}
          CORE64_CHANGELOG_BASE_REF: ${{ github.event.inputs.core64_changelog_base_ref }}
          CORE64_CHANGELOG_HEAD_REF: ${{ github.event.inputs.core64_changelog_head_ref }}
        run: |
          if [ -z "$CORE64_API_BASE" ]; then
            echo "Missing required input: core64_api_base"
            exit 1
          fi

          if [ -z "$CORE64_ADMIN_PASSWORD" ]; then
            echo "Missing resolved admin password. Configure secret CORE64_ADMIN_PASSWORD or fallback input core64_admin_password."
            exit 1
          fi

          if [[ "$CORE64_API_BASE" != http://* && "$CORE64_API_BASE" != https://* ]]; then
            echo "core64_api_base must start with http:// or https://"
            exit 1
          fi

          if ! [[ "$CORE64_SMOKE_TIMEOUT_MS" =~ ^[0-9]+$ ]] || [ "$CORE64_SMOKE_TIMEOUT_MS" -lt 1000 ]; then
            echo "core64_smoke_timeout_ms must be an integer >= 1000"
            exit 1
          fi

          if [ "$CORE64_SMOKE_CONTACT" != "true" ] && [ "$CORE64_SMOKE_CONTACT" != "false" ]; then
            echo "core64_smoke_contact must be 'true' or 'false'"
            exit 1
          fi

          if [ "$CORE64_SMOKE_RATE_LIMIT_CHECK" != "true" ] && [ "$CORE64_SMOKE_RATE_LIMIT_CHECK" != "false" ]; then
            echo "core64_smoke_rate_limit_check must be 'true' or 'false'"
            exit 1
          fi

          if ! [[ "$CORE64_SMOKE_RATE_LIMIT_ATTEMPTS" =~ ^[0-9]+$ ]] || [ "$CORE64_SMOKE_RATE_LIMIT_ATTEMPTS" -lt 2 ]; then
            echo "core64_smoke_rate_limit_attempts must be an integer >= 2"
            exit 1
          fi

          if ! [[ "$CORE64_SMOKE_RATE_LIMIT_COLLECTIONS_ATTEMPTS" =~ ^[0-9]+$ ]] || [ "$CORE64_SMOKE_RATE_LIMIT_COLLECTIONS_ATTEMPTS" -lt 2 ]; then
            echo "core64_smoke_rate_limit_collections_attempts must be an integer >= 2"
            exit 1
          fi

          if [ "$CORE64_OVERRIDE_ROLE_DIVERSITY" != "true" ] && [ "$CORE64_OVERRIDE_ROLE_DIVERSITY" != "false" ]; then
            echo "core64_override_role_diversity must be 'true' or 'false'"
            exit 1
          fi

          if [ -z "$CORE64_CHANGELOG_BASE_REF" ]; then
            echo "Missing required input: core64_changelog_base_ref"
            exit 1
          fi

          if [ -z "$CORE64_CHANGELOG_HEAD_REF" ]; then
            echo "Missing required input: core64_changelog_head_ref"
            exit 1
          fi

      - name: Validate release owner assignments
        shell: pwsh
        run: |
          $overrideRoleDiversity = "${{ github.event.inputs.core64_override_role_diversity }}" -eq "true"
          ./scripts/verify-release-owner-assignments.ps1 -OverrideRoleDiversity:$overrideRoleDiversity

      - name: Validate changelog coverage
        env:
          CORE64_CHANGELOG_BASE_REF: ${{ github.event.inputs.core64_changelog_base_ref }}
          CORE64_CHANGELOG_HEAD_REF: ${{ github.event.inputs.core64_changelog_head_ref }}
        run: node scripts/verify-changelog-coverage.mjs --base "$CORE64_CHANGELOG_BASE_REF" --head "$CORE64_CHANGELOG_HEAD_REF"

      - name: Validate changelog format
        env:
          CORE64_CHANGELOG_BASE_REF: ${{ github.event.inputs.core64_changelog_base_ref }}
          CORE64_CHANGELOG_HEAD_REF: ${{ github.event.inputs.core64_changelog_head_ref }}
        run: node scripts/verify-changelog-format.mjs --base "$CORE64_CHANGELOG_BASE_REF" --head "$CORE64_CHANGELOG_HEAD_REF"

      - name: Validate changelog format helper
        run: node scripts/test-verify-changelog-format.mjs

      - name: Validate changelog coverage helper
        run: node scripts/test-verify-changelog-coverage.mjs

      - name: Validate contact smoke expectation helper
        run: node scripts/test-resolve-contact-smoke-expected-status.mjs

      - name: Validate workflow secret
        env:
          BRANCH_PROTECTION_TOKEN: ${{ secrets['BRANCH_PROTECTION_TOKEN'] }}
        run: |
          if [ -z "$BRANCH_PROTECTION_TOKEN" ]; then
            echo "Missing required secret: BRANCH_PROTECTION_TOKEN"
            exit 1
          fi

      - name: Validate Cloud Run network hint helper
        run: node scripts/test-print-cloud-run-network-hint.mjs

      - name: Validate log sanitizer helper
        run: node scripts/test-log-sanitizer.mjs

      - name: Validate runtime console usage helper
        run: node scripts/test-runtime-console-usage.mjs

      - name: Validate API error contract helper
        run: node scripts/test-verify-api-error-contract.mjs

      - name: Validate settings i18n consistency helper
        run: node scripts/test-check-settings-i18n-consistency.mjs

      - name: Validate smoke-check helper
        run: node scripts/test-smoke-check.mjs

      - name: Run API error contract check
        env:
          CORE64_API_BASE: ${{ github.event.inputs.core64_api_base }}
          CORE64_CONTRACT_TIMEOUT_MS: ${{ github.event.inputs.core64_smoke_timeout_ms }}
          CORE64_CONTRACT_SKIP_AUTH_RATE_LIMIT_CHECK: "true"
          CORE64_CONTRACT_AUTH_RATE_LIMIT_ATTEMPTS: "30"
        run: node scripts/verify-api-error-contract.mjs

      - name: Run smoke-check
        env:
          CORE64_API_BASE: ${{ github.event.inputs.core64_api_base }}
          CORE64_SMOKE_TIMEOUT_MS: ${{ github.event.inputs.core64_smoke_timeout_ms }}
          CORE64_SMOKE_CONTACT: ${{ github.event.inputs.core64_smoke_contact }}
        run: node scripts/smoke-check.mjs

      - name: Run settings/public contract check
        env:
          CORE64_API_BASE: ${{ github.event.inputs.core64_api_base }}
          CORE64_CONTRACT_TIMEOUT_MS: ${{ github.event.inputs.core64_smoke_timeout_ms }}
        run: npm run contract-check:settings-public

      - name: Run settings i18n consistency check
        env:
          CORE64_API_BASE: ${{ github.event.inputs.core64_api_base }}
          CORE64_CONSISTENCY_TIMEOUT_MS: ${{ github.event.inputs.core64_smoke_timeout_ms }}
        run: npm run consistency-check:settings-i18n

      - name: Install UI smoke dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run UI smoke
        env:
          CORE64_API_BASE: ${{ github.event.inputs.core64_api_base }}
          CORE64_UI_HEADLESS: "true"
          CORE64_UI_SMOKE_TIMEOUT_MS: ${{ github.event.inputs.core64_smoke_timeout_ms }}
        run: npm run ui-smoke

      - name: Verify branch protection policy
        shell: pwsh
        env:
          BRANCH_PROTECTION_TOKEN: ${{ secrets['BRANCH_PROTECTION_TOKEN'] }}
        run: |
          $expectedContexts = "${{ github.event.inputs.expected_check_contexts }}".Split(",") | ForEach-Object { $_.Trim() } | Where-Object { $_ -ne "" }
          if ($expectedContexts.Count -eq 0) {
            throw "Input expected_check_contexts must contain at least one value."
          }

          ./scripts/verify-branch-protection.ps1 `
            -Owner "${{ github.event.inputs.owner }}" `
            -Repo "${{ github.event.inputs.repo }}" `
            -Branch "${{ github.event.inputs.branch }}" `
            -ExpectedCheckContexts $expectedContexts `
            -MinimumApprovals ([int]"${{ github.event.inputs.minimum_approvals }}") `
            -ExpectedConversationResolution "${{ github.event.inputs.expected_conversation_resolution }}" `
            -Token "$env:BRANCH_PROTECTION_TOKEN"

      - name: Run mutation rate-limit smoke check
        if: ${{ github.event.inputs.core64_smoke_rate_limit_check == 'true' }}
        env:
          CORE64_API_BASE: ${{ github.event.inputs.core64_api_base }}
          CORE64_SMOKE_TIMEOUT_MS: ${{ github.event.inputs.core64_smoke_timeout_ms }}
          CORE64_SMOKE_CONTACT: "false"
          CORE64_SMOKE_RATE_LIMIT_CHECK: "true"
          CORE64_SMOKE_RATE_LIMIT_ATTEMPTS: ${{ github.event.inputs.core64_smoke_rate_limit_attempts }}
          CORE64_SMOKE_RATE_LIMIT_COLLECTIONS_ATTEMPTS: ${{ github.event.inputs.core64_smoke_rate_limit_collections_attempts }}
        run: node scripts/smoke-check.mjs
