name: Deploy Google Run

on:
  workflow_dispatch:
    inputs:
      gcp_project_id:
        description: GCP project ID
        required: true
        type: string
      gcp_region:
        description: Google Cloud region
        required: false
        default: europe-west1
        type: string
      service_name:
        description: Cloud Run service name
        required: false
        default: core64-api
        type: string
      runtime_service_account:
        description: Cloud Run runtime service account email (empty -> github-actions-deployer@<project>.iam.gserviceaccount.com)
        required: false
        default: ""
        type: string
      artifact_repo:
        description: Artifact Registry repository name
        required: false
        default: core64_records
        type: string
      image_tag:
        description: Image tag
        required: false
        default: manual
        type: string
      cors_origin:
        description: Production CORS origin list (comma-separated)
        required: true
        type: string
      contact_captcha_provider:
        description: Contact captcha provider
        required: false
        default: none
        type: choice
        options:
          - none
          - hcaptcha
          - recaptcha_v2
      database_url_secret_name:
        description: GCP Secret Manager secret name for DATABASE_URL
        required: false
        default: DATABASE_URL
        type: string
      jwt_secret_name:
        description: GCP Secret Manager secret name for JWT_SECRET
        required: false
        default: JWT_SECRET
        type: string
      admin_password_secret_name:
        description: GCP Secret Manager secret name for ADMIN_PASSWORD
        required: false
        default: ADMIN_PASSWORD
        type: string
      contact_captcha_secret_name:
        description: GCP Secret Manager secret name for CONTACT_CAPTCHA_SECRET
        required: false
        default: CONTACT_CAPTCHA_SECRET
        type: string
      run_db_migrate:
        description: Run backend database migration before deploy (true/false)
        required: false
        default: "true"
        type: string
      run_db_seed:
        description: Run backend seed after migration (true/false)
        required: false
        default: "false"
        type: string
      run_post_deploy_smoke:
        description: Run smoke-check after deploy (true/false)
        required: false
        default: "true"
        type: string
      core64_smoke_timeout_ms:
        description: Smoke-check timeout in milliseconds
        required: false
        default: "60000"
        type: string
      core64_smoke_retries:
        description: Post-deploy smoke-check retry attempts
        required: false
        default: "3"
        type: string
      core64_smoke_contact:
        description: Enable optional contact endpoint check in post-deploy smoke (true/false)
        required: false
        default: "true"
        type: string
      db_connection_timeout_ms:
        description: PostgreSQL connection timeout in milliseconds
        required: false
        default: "8000"
        type: string
      db_query_timeout_ms:
        description: PostgreSQL query timeout in milliseconds
        required: false
        default: "10000"
        type: string
      db_statement_timeout_ms:
        description: PostgreSQL statement timeout in milliseconds
        required: false
        default: "10000"
        type: string
      auto_fix_pooler_sslmode:
        description: Auto-fix DATABASE_URL pooler sslmode in Secret Manager before strict validation (true/false)
        required: false
        default: "false"
        type: string
      require_release_owner_assignments:
        description: Require RELEASE_OWNERS_AND_ESCALATION.md to have real names (true/false)
        required: false
        default: "true"
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required workflow secret
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          if [ -z "$GCP_SA_KEY" ]; then
            echo "Missing required secret: GCP_SA_KEY"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ github.event.inputs.gcp_project_id }}

      - name: Validate deploy inputs
        env:
          CORS_ORIGIN: ${{ github.event.inputs.cors_origin }}
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          RUNTIME_SERVICE_ACCOUNT: ${{ github.event.inputs.runtime_service_account }}
          CONTACT_CAPTCHA_PROVIDER: ${{ github.event.inputs.contact_captcha_provider }}
          DATABASE_URL_SECRET_NAME: ${{ github.event.inputs.database_url_secret_name }}
          JWT_SECRET_NAME: ${{ github.event.inputs.jwt_secret_name }}
          ADMIN_PASSWORD_SECRET_NAME: ${{ github.event.inputs.admin_password_secret_name }}
          CONTACT_CAPTCHA_SECRET_NAME: ${{ github.event.inputs.contact_captcha_secret_name }}
          RUN_DB_MIGRATE: ${{ github.event.inputs.run_db_migrate }}
          RUN_DB_SEED: ${{ github.event.inputs.run_db_seed }}
          RUN_POST_DEPLOY_SMOKE: ${{ github.event.inputs.run_post_deploy_smoke }}
          CORE64_SMOKE_CONTACT: ${{ github.event.inputs.core64_smoke_contact }}
          DB_CONNECTION_TIMEOUT_MS: ${{ github.event.inputs.db_connection_timeout_ms }}
          DB_QUERY_TIMEOUT_MS: ${{ github.event.inputs.db_query_timeout_ms }}
          DB_STATEMENT_TIMEOUT_MS: ${{ github.event.inputs.db_statement_timeout_ms }}
          AUTO_FIX_POOLER_SSLMODE: ${{ github.event.inputs.auto_fix_pooler_sslmode }}
          REQUIRE_RELEASE_OWNER_ASSIGNMENTS: ${{ github.event.inputs.require_release_owner_assignments }}
        run: |
          if [ -z "$CORS_ORIGIN" ]; then
            echo "Missing required input: cors_origin"
            exit 1
          fi

          if [[ "$CORS_ORIGIN" == *"*"* ]]; then
            echo "Invalid cors_origin: wildcard '*' is not allowed for production deploy"
            exit 1
          fi

          for secret_name in "$DATABASE_URL_SECRET_NAME" "$JWT_SECRET_NAME" "$ADMIN_PASSWORD_SECRET_NAME"; do
            if [ -z "$secret_name" ]; then
              echo "Secret name inputs for database/jwt/admin must not be empty"
              exit 1
            fi
          done

          if [ "$CONTACT_CAPTCHA_PROVIDER" != "none" ] && [ -z "$CONTACT_CAPTCHA_SECRET_NAME" ]; then
            echo "contact_captcha_secret_name is required when contact_captcha_provider is not 'none'"
            exit 1
          fi

          for flag in "$RUN_DB_MIGRATE" "$RUN_DB_SEED" "$RUN_POST_DEPLOY_SMOKE" "$CORE64_SMOKE_CONTACT" "$AUTO_FIX_POOLER_SSLMODE"; do
            if [ "$flag" != "true" ] && [ "$flag" != "false" ]; then
              echo "Boolean inputs must be 'true' or 'false'"
              exit 1
            fi
          done

          if [ "$REQUIRE_RELEASE_OWNER_ASSIGNMENTS" != "true" ] && [ "$REQUIRE_RELEASE_OWNER_ASSIGNMENTS" != "false" ]; then
            echo "Boolean inputs must be 'true' or 'false'"
            exit 1
          fi

          for timeout_value in "$DB_CONNECTION_TIMEOUT_MS" "$DB_QUERY_TIMEOUT_MS" "$DB_STATEMENT_TIMEOUT_MS"; do
            if ! [[ "$timeout_value" =~ ^[0-9]+$ ]] || [ "$timeout_value" -lt 1000 ]; then
              echo "DB timeout inputs must be integers >= 1000"
              exit 1
            fi
          done

          if [ -z "$RUNTIME_SERVICE_ACCOUNT" ]; then
            echo "Using default runtime service account: github-actions-deployer@$GCP_PROJECT_ID.iam.gserviceaccount.com"
          fi

      - name: Validate release owner assignments
        if: ${{ github.event.inputs.require_release_owner_assignments == 'true' }}
        run: |
          FILE="RELEASE_OWNERS_AND_ESCALATION.md"
          if [ ! -f "$FILE" ]; then
            echo "Missing required file: $FILE"
            exit 1
          fi

          if grep -q "<name>" "$FILE"; then
            echo "Release owner placeholders are still present in $FILE. Fill real names before deploy."
            exit 1
          fi

          echo "Release owner assignment check passed."

      - name: Validate GCP resources and secrets
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          ARTIFACT_REPO: ${{ github.event.inputs.artifact_repo }}
          CONTACT_CAPTCHA_PROVIDER: ${{ github.event.inputs.contact_captcha_provider }}
          DATABASE_URL_SECRET_NAME: ${{ github.event.inputs.database_url_secret_name }}
          JWT_SECRET_NAME: ${{ github.event.inputs.jwt_secret_name }}
          ADMIN_PASSWORD_SECRET_NAME: ${{ github.event.inputs.admin_password_secret_name }}
          CONTACT_CAPTCHA_SECRET_NAME: ${{ github.event.inputs.contact_captcha_secret_name }}
        run: |
          if ! gcloud artifacts repositories describe "$ARTIFACT_REPO" --project "$GCP_PROJECT_ID" --location "$GCP_REGION" >/dev/null 2>&1; then
            echo "Artifact Registry repository not found: $ARTIFACT_REPO in $GCP_REGION"
            exit 1
          fi

          for secret_name in "$DATABASE_URL_SECRET_NAME" "$JWT_SECRET_NAME" "$ADMIN_PASSWORD_SECRET_NAME"; do
            if ! gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$secret_name" >/dev/null 2>&1; then
              echo "Secret missing or inaccessible: $secret_name"
              exit 1
            fi
          done

          if [ "$CONTACT_CAPTCHA_PROVIDER" != "none" ]; then
            if ! gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$CONTACT_CAPTCHA_SECRET_NAME" >/dev/null 2>&1; then
              echo "Captcha secret missing or inaccessible: $CONTACT_CAPTCHA_SECRET_NAME"
              exit 1
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Validate runtime config from secrets
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          CONTACT_CAPTCHA_PROVIDER: ${{ github.event.inputs.contact_captcha_provider }}
          DATABASE_URL_SECRET_NAME: ${{ github.event.inputs.database_url_secret_name }}
          JWT_SECRET_NAME: ${{ github.event.inputs.jwt_secret_name }}
          ADMIN_PASSWORD_SECRET_NAME: ${{ github.event.inputs.admin_password_secret_name }}
          CONTACT_CAPTCHA_SECRET_NAME: ${{ github.event.inputs.contact_captcha_secret_name }}
          CORS_ORIGIN: ${{ github.event.inputs.cors_origin }}
          DB_CONNECTION_TIMEOUT_MS: ${{ github.event.inputs.db_connection_timeout_ms }}
          DB_QUERY_TIMEOUT_MS: ${{ github.event.inputs.db_query_timeout_ms }}
          DB_STATEMENT_TIMEOUT_MS: ${{ github.event.inputs.db_statement_timeout_ms }}
          AUTO_FIX_POOLER_SSLMODE: ${{ github.event.inputs.auto_fix_pooler_sslmode }}
        run: |
          export NODE_ENV=production
          export DB_SSL=true
          export DB_SSL_REJECT_UNAUTHORIZED=false
          export DB_SSL_ALLOW_SELF_SIGNED=true
          export DB_CONNECTION_TIMEOUT_MS
          export DB_QUERY_TIMEOUT_MS
          export DB_STATEMENT_TIMEOUT_MS

          export DATABASE_URL=$(gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$DATABASE_URL_SECRET_NAME")
          export JWT_SECRET=$(gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$JWT_SECRET_NAME")
          export ADMIN_PASSWORD=$(gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$ADMIN_PASSWORD_SECRET_NAME")
          export CONTACT_CAPTCHA_PROVIDER
          export CORS_ORIGIN

          POLICY_JSON=$(DATABASE_URL_VALUE="$DATABASE_URL" node scripts/check-database-url-policy.mjs)
          POLICY_VALID=$(printf '%s' "$POLICY_JSON" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const p=JSON.parse(d);process.stdout.write(String(Boolean(p.valid)));});")
          POLICY_REASON=$(printf '%s' "$POLICY_JSON" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const p=JSON.parse(d);process.stdout.write(String(p.reason||''));});")

          if [ "$AUTO_FIX_POOLER_SSLMODE" = "true" ]; then
            echo "Checking DATABASE_URL for optional pooler sslmode auto-remediation..."
            if [ "$POLICY_VALID" != "true" ] && [ "$POLICY_REASON" = "unsupported_sslmode_for_pooler_endpoint" ]; then
              UPDATED_DATABASE_URL=$(DATABASE_URL_VALUE="$DATABASE_URL" DB_POOLER_SSLMODE=require node scripts/set-database-url-pooler-sslmode.mjs --raw-url --strict)
              if [ "$UPDATED_DATABASE_URL" != "$DATABASE_URL" ]; then
                if ! printf '%s' "$UPDATED_DATABASE_URL" | gcloud secrets versions add "$DATABASE_URL_SECRET_NAME" --project "$GCP_PROJECT_ID" --data-file=- >/dev/null; then
                  echo "Failed to add a new version for secret '$DATABASE_URL_SECRET_NAME' during auto-fix."
                  echo "Ensure the deploy identity has Secret Manager write access (for example roles/secretmanager.secretVersionAdder on this secret)."
                  exit 1
                fi
                VERIFIED_DATABASE_URL=$(gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$DATABASE_URL_SECRET_NAME")
                if [ "$VERIFIED_DATABASE_URL" = "$UPDATED_DATABASE_URL" ]; then
                  DATABASE_URL="$VERIFIED_DATABASE_URL"
                  echo "Applied pooler sslmode auto-remediation to DATABASE_URL secret."
                else
                  echo "Failed to verify DATABASE_URL secret update after remediation"
                  exit 1
                fi
              fi
            fi
          elif [ "$POLICY_VALID" != "true" ] && [ "$POLICY_REASON" = "unsupported_sslmode_for_pooler_endpoint" ]; then
            echo "Tip: detected unsupported pooler sslmode while auto_fix_pooler_sslmode=false."
            echo "Tip: re-run this workflow with input auto_fix_pooler_sslmode=true, or update DATABASE_URL secret manually before strict validation."
          fi

          echo "DATABASE_URL policy verdict (strict mode, safe metadata):"
          DATABASE_URL_VALUE="$DATABASE_URL" node scripts/check-database-url-policy.mjs --strict --emit-remediation-command

          echo "DATABASE_URL target snapshot (safe metadata):"
          DATABASE_URL_VALUE="$DATABASE_URL" node scripts/print-db-target-snapshot.mjs --strict

          if [ "$CONTACT_CAPTCHA_PROVIDER" != "none" ]; then
            export CONTACT_CAPTCHA_SECRET=$(gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$CONTACT_CAPTCHA_SECRET_NAME")
          else
            export CONTACT_CAPTCHA_SECRET=""
          fi

          cd backend
          npm ci
          node -e "import('./src/config.js').then((m) => { m.validateConfig(); console.log('Runtime config validation passed.'); })"

      - name: Run database migration/seed
        if: ${{ github.event.inputs.run_db_migrate == 'true' || github.event.inputs.run_db_seed == 'true' }}
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          DATABASE_URL_SECRET_NAME: ${{ github.event.inputs.database_url_secret_name }}
          RUN_DB_MIGRATE: ${{ github.event.inputs.run_db_migrate }}
          RUN_DB_SEED: ${{ github.event.inputs.run_db_seed }}
        run: |
          export DATABASE_URL=$(gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$DATABASE_URL_SECRET_NAME")
          if [ -z "$DATABASE_URL" ]; then
            echo "Unable to read DATABASE_URL from Secret Manager"
            exit 1
          fi

          export DB_SSL=true
          export DB_SSL_REJECT_UNAUTHORIZED=false
          export DB_SSL_ALLOW_SELF_SIGNED=true

          cd backend
          npm ci

          if [ "$RUN_DB_MIGRATE" = "true" ]; then
            npm run migrate
          fi

          if [ "$RUN_DB_SEED" = "true" ]; then
            npm run seed
          fi

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ github.event.inputs.gcp_region }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          ARTIFACT_REPO: ${{ github.event.inputs.artifact_repo }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          IMAGE_URI="$GCP_REGION-docker.pkg.dev/$GCP_PROJECT_ID/$ARTIFACT_REPO/core64-backend:$IMAGE_TAG"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          docker build -f backend/Dockerfile -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          SERVICE_NAME: ${{ github.event.inputs.service_name }}
          RUNTIME_SERVICE_ACCOUNT_INPUT: ${{ github.event.inputs.runtime_service_account }}
          CORS_ORIGIN: ${{ github.event.inputs.cors_origin }}
          CONTACT_CAPTCHA_PROVIDER: ${{ github.event.inputs.contact_captcha_provider }}
          DATABASE_URL_SECRET_NAME: ${{ github.event.inputs.database_url_secret_name }}
          JWT_SECRET_NAME: ${{ github.event.inputs.jwt_secret_name }}
          ADMIN_PASSWORD_SECRET_NAME: ${{ github.event.inputs.admin_password_secret_name }}
          CONTACT_CAPTCHA_SECRET_NAME: ${{ github.event.inputs.contact_captcha_secret_name }}
          DB_CONNECTION_TIMEOUT_MS: ${{ github.event.inputs.db_connection_timeout_ms }}
          DB_QUERY_TIMEOUT_MS: ${{ github.event.inputs.db_query_timeout_ms }}
          DB_STATEMENT_TIMEOUT_MS: ${{ github.event.inputs.db_statement_timeout_ms }}
        run: |
          RUNTIME_SERVICE_ACCOUNT="$RUNTIME_SERVICE_ACCOUNT_INPUT"
          if [ -z "$RUNTIME_SERVICE_ACCOUNT" ]; then
            RUNTIME_SERVICE_ACCOUNT="github-actions-deployer@$GCP_PROJECT_ID.iam.gserviceaccount.com"
          fi

          SECRET_FLAGS="DATABASE_URL=$DATABASE_URL_SECRET_NAME:latest,JWT_SECRET=$JWT_SECRET_NAME:latest,ADMIN_PASSWORD=$ADMIN_PASSWORD_SECRET_NAME:latest"
          if [ "$CONTACT_CAPTCHA_PROVIDER" != "none" ]; then
            SECRET_FLAGS="$SECRET_FLAGS,CONTACT_CAPTCHA_SECRET=$CONTACT_CAPTCHA_SECRET_NAME:latest"
          fi

          gcloud run deploy "$SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --image "$IMAGE_URI" \
            --platform managed \
            --allow-unauthenticated \
            --no-use-http2 \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --set-env-vars "NODE_ENV=production,DB_SSL=true,DB_SSL_REJECT_UNAUTHORIZED=false,DB_SSL_ALLOW_SELF_SIGNED=true,DB_CONNECTION_TIMEOUT_MS=$DB_CONNECTION_TIMEOUT_MS,DB_QUERY_TIMEOUT_MS=$DB_QUERY_TIMEOUT_MS,DB_STATEMENT_TIMEOUT_MS=$DB_STATEMENT_TIMEOUT_MS,CORS_ORIGIN=$CORS_ORIGIN,CONTACT_CAPTCHA_PROVIDER=$CONTACT_CAPTCHA_PROVIDER" \
            --set-secrets "$SECRET_FLAGS" \
            --port 3000 \
            --cpu 1 \
            --memory 512Mi \
            --concurrency 80 \
            --min-instances 0 \
            --max-instances 4

      - name: Snapshot deployed runtime wiring
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          SERVICE_NAME: ${{ github.event.inputs.service_name }}
        run: |
          echo "Deployed service summary (safe metadata only):"
          gcloud run services describe "$SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='yaml(status.url,status.latestReadyRevisionName,status.conditions,status.traffic,spec.template.spec.serviceAccountName,spec.template.metadata.annotations,spec.template.spec.containers[0].env)'

      - name: Post-deploy smoke check
        if: ${{ github.event.inputs.run_post_deploy_smoke == 'true' }}
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          SERVICE_NAME: ${{ github.event.inputs.service_name }}
          DATABASE_URL_SECRET_NAME: ${{ github.event.inputs.database_url_secret_name }}
          ADMIN_PASSWORD_SECRET_NAME: ${{ github.event.inputs.admin_password_secret_name }}
          CORE64_SMOKE_TIMEOUT_MS: ${{ github.event.inputs.core64_smoke_timeout_ms }}
          CORE64_SMOKE_RETRIES: ${{ github.event.inputs.core64_smoke_retries }}
          CORE64_SMOKE_CONTACT: ${{ github.event.inputs.core64_smoke_contact }}
          CORE64_SMOKE_MODE: health
        run: |
          SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format='value(status.url)')
          if [ -z "$SERVICE_URL" ]; then
            echo "Unable to resolve Cloud Run service URL for smoke-check"
            exit 1
          fi

          ADMIN_PASSWORD=$(gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$ADMIN_PASSWORD_SECRET_NAME")
          if [ -z "$ADMIN_PASSWORD" ]; then
            echo "Unable to read admin password from Secret Manager"
            exit 1
          fi

          export CORE64_API_BASE="$SERVICE_URL/api"
          export CORE64_ADMIN_PASSWORD="$ADMIN_PASSWORD"

          RETRIES=${CORE64_SMOKE_RETRIES:-3}
          if ! [[ "$RETRIES" =~ ^[0-9]+$ ]] || [ "$RETRIES" -lt 1 ]; then
            echo "Invalid CORE64_SMOKE_RETRIES value: $RETRIES"
            exit 1
          fi

          DATABASE_URL=$(gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$DATABASE_URL_SECRET_NAME")
          if [ -z "$DATABASE_URL" ]; then
            echo "Unable to read DATABASE_URL from Secret Manager"
            exit 1
          fi

          SERVICE_JSON=$(gcloud run services describe "$SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format=json)
          if [ -z "$SERVICE_JSON" ]; then
            echo "Unable to fetch Cloud Run service JSON for DB route compatibility check"
            exit 1
          fi

          echo "Pre-smoke DB route compatibility verdict (strict mode):"
          CLOUD_RUN_SERVICE_JSON="$SERVICE_JSON" DATABASE_URL_VALUE="$DATABASE_URL" node scripts/print-cloud-run-db-route-verdict.mjs --strict

          attempt=1
          until [ "$attempt" -gt "$RETRIES" ]; do
            echo "Running post-deploy smoke-check against $CORE64_API_BASE (attempt $attempt/$RETRIES)"
            if node scripts/smoke-check.mjs; then
              echo "Post-deploy smoke-check passed on attempt $attempt."
              exit 0
            fi

            if [ "$attempt" -lt "$RETRIES" ]; then
              echo "Smoke-check failed on attempt $attempt; waiting 15s before retry."
              sleep 15
            fi

            attempt=$((attempt + 1))
          done

          echo "Post-deploy smoke-check failed after $RETRIES attempts."
          exit 1

      - name: Collect diagnostics after smoke failure
        if: ${{ failure() && github.event.inputs.run_post_deploy_smoke == 'true' }}
        env:
          GCP_PROJECT_ID: ${{ github.event.inputs.gcp_project_id }}
          GCP_REGION: ${{ github.event.inputs.gcp_region }}
          SERVICE_NAME: ${{ github.event.inputs.service_name }}
          DATABASE_URL_SECRET_NAME: ${{ github.event.inputs.database_url_secret_name }}
        run: |
          set +e

          SERVICE_URL=$(gcloud run services describe "$SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format='value(status.url)')
          REVISION=$(gcloud run services describe "$SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format='value(status.latestReadyRevisionName)')

          echo "Diagnostic: service URL = $SERVICE_URL"
          echo "Diagnostic: latest ready revision = $REVISION"

          DATABASE_URL=$(gcloud secrets versions access latest --project "$GCP_PROJECT_ID" --secret "$DATABASE_URL_SECRET_NAME")
          if [ -n "$DATABASE_URL" ]; then
            echo "Diagnostic: DATABASE_URL target snapshot (safe metadata)"
            DATABASE_URL_VALUE="$DATABASE_URL" node scripts/print-db-target-snapshot.mjs
          fi

          if [ -n "$SERVICE_URL" ]; then
            echo "Diagnostic: GET $SERVICE_URL/api/health"
            curl -sS -i "$SERVICE_URL/api/health" || true

            echo "Diagnostic: GET $SERVICE_URL/api/health/db"
            curl -sS -i "$SERVICE_URL/api/health/db" || true
          fi

          if [ -n "$REVISION" ]; then
            echo "Diagnostic: recent Cloud Run logs for revision $REVISION"
            gcloud logging read \
              "resource.type=cloud_run_revision AND resource.labels.service_name=$SERVICE_NAME AND resource.labels.revision_name=$REVISION" \
              --project "$GCP_PROJECT_ID" \
              --limit 80 \
              --order desc \
              --format='value(timestamp,severity,textPayload,jsonPayload.message)' || true
          fi

          echo "Diagnostic: Cloud Run networking annotations"
          gcloud run services describe "$SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format='yaml(spec.template.metadata.annotations)' || true

          SERVICE_JSON=$(gcloud run services describe "$SERVICE_NAME" --project "$GCP_PROJECT_ID" --region "$GCP_REGION" --format=json)
          if [ -n "$SERVICE_JSON" ]; then
            echo "Diagnostic: Cloud Run network routing hint"
            CLOUD_RUN_SERVICE_JSON="$SERVICE_JSON" node scripts/print-cloud-run-network-hint.mjs || true

            if [ -n "$DATABASE_URL" ]; then
              echo "Diagnostic: Cloud Run and DB route compatibility verdict"
              CLOUD_RUN_SERVICE_JSON="$SERVICE_JSON" DATABASE_URL_VALUE="$DATABASE_URL" node scripts/print-cloud-run-db-route-verdict.mjs || true
            fi
          fi
